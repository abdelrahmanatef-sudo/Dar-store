<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | دار ستور</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #c9a96e;
            --accent-light: #e8d5b5;
            --text: #2d2d2d;
            --text-light: #666;
            --bg: #faf8f5;
            --white: #ffffff;
            --danger: #c0392b;
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.12);
            --radius: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            max-width: 1000px;
            width: 100%;
            background: var(--white);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
        }

        .auth-image {
            background: linear-gradient(135deg, rgba(26,26,46,0.8), rgba(22,33,62,0.9)), url('https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?w=600&h=800&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 3rem;
            color: white;
        }
        .auth-image h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        .auth-image p { opacity: 0.8; line-height: 1.8; }

        .auth-form {
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-logo .logo-icon {
            width: 50px; height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 1.3rem;
            margin-bottom: 1rem;
        }
        .auth-logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--primary);
        }

        .tabs {
            display: flex;
            background: var(--bg);
            border-radius: 50px;
            padding: 4px;
            margin-bottom: 2rem;
        }
        .tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: none;
            border-radius: 50px;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--text-light);
        }
        .tab.active {
            background: var(--white);
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .form-panel { display: none; }
        .form-panel.active { display: block; }

        .form-group {
            margin-bottom: 1.2rem;
            position: relative;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--primary);
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px 12px 40px;
            border: 2px solid #e8e8e8;
            border-radius: var(--radius);
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(201,169,110,0.1);
        }
        .form-group i {
            position: absolute;
            left: 14px;
            bottom: 14px;
            color: var(--text-light);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), #b8945f);
            border: none;
            border-radius: 50px;
            color: var(--primary);
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }
        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(201,169,110,0.3);
        }

        .social-login {
            margin-top: 2rem;
            text-align: center;
        }
        .social-login p {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            position: relative;
        }
        .social-login p::before,
        .social-login p::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 60px;
            height: 1px;
            background: #e8e8e8;
        }
        .social-login p::before { right: 0; }
        .social-login p::after { left: 0; }

        .social-btns {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        .social-btn {
            width: 50px; height: 50px;
            border-radius: 50%;
            border: 2px solid #e8e8e8;
            background: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
        }
        .social-btn:hover {
            border-color: var(--accent);
            transform: translateY(-3px);
        }

        .forgot-link {
            text-align: center;
            margin-top: 1rem;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .auth-container { grid-template-columns: 1fr; }
            .auth-image { display: none; }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-image">
            <h2>أهلاً بك في دار ستور</h2>
            <p>انضم لآلاف العملاء السعداء واستمتع بتجربة تسوق فريدة لكل ما يحتاجه منزلك</p>
        </div>

        <div class="auth-form">
            <a href="index.html" style="text-decoration: none; display: block; margin-bottom: 1rem;"><div class="auth-logo">
                <div class="logo-icon"><i class="fas fa-home"></i></div>
                <h1>دار <span style="color: var(--accent);">ستور</span></h1>
            </div></a>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">تسجيل الدخول</button>
                <button class="tab" onclick="switchTab('register')">حساب جديد</button>
            </div>

            <!-- Login Panel -->
            <div class="form-panel active" id="loginPanel">
                <form onsubmit="event.preventDefault(); handleLogin();">
                    <div class="form-group">
                        <label>البريد الإلكتروني أو رقم الهاتف</label>
                        <input type="text" placeholder="example@email.com" required>
                        <i class="fas fa-envelope"></i>
                    </div>
                    <div class="form-group">
                        <label>كلمة المرور</label>
                        <input type="password" placeholder="••••••••" required>
                        <i class="fas fa-lock"></i>
                    </div>
                    <button type="submit" class="auth-btn">تسجيل الدخول</button>
                </form>
                <a href="#" class="forgot-link">نسيت كلمة المرور؟</a>
            </div>

            <!-- Register Panel -->
            <div class="form-panel" id="registerPanel">
                <form onsubmit="event.preventDefault(); handleRegister();">
                    <div class="form-group">
                        <label>الاسم الكامل</label>
                        <input type="text" placeholder="محمد أحمد" required>
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="form-group">
                        <label>البريد الإلكتروني</label>
                        <input type="email" placeholder="example@email.com" required>
                        <i class="fas fa-envelope"></i>
                    </div>
                    <div class="form-group">
                        <label>رقم الهاتف</label>
                        <input type="tel" placeholder="01xxxxxxxxxx" required>
                        <i class="fas fa-phone"></i>
                    </div>
                    <div class="form-group">
                        <label>كلمة المرور</label>
                        <input type="password" placeholder="••••••••" required>
                        <i class="fas fa-lock"></i>
                    </div>
                    <button type="submit" class="auth-btn">إنشاء حساب</button>
                </form>
            </div>

            <div class="social-login">
                <p>أو سجل دخول باستخدام</p>
                <div class="social-btns">
                    <button class="social-btn" style="color: #db4437;"><i class="fab fa-google"></i></button>
                    <button class="social-btn" style="color: #1877f2;"><i class="fab fa-facebook-f"></i></button>
                    <button class="social-btn" style="color: #000;"><i class="fab fa-apple"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('loginPanel').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('registerPanel').classList.add('active');
            }
        }

        function handleLogin() {
            alert('تم تسجيل الدخول بنجاح! (في النظام الفعلي هيتم التحقق من البيانات)');
            window.location.href = 'index.html';
        }

        function handleRegister() {
            alert('تم إنشاء الحساب بنجاح! (في النظام الفعلي هيتم حفظ البيانات)');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
