<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dar-Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<style>
body{
    font-family:'Poppins',sans-serif;
    background:#0f172a;
    color:white;
    overflow-x:hidden;
}
.card{
    backdrop-filter: blur(14px);
    background: rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    transition:0.4s;
}
.card:hover{
    transform: translateY(-10px) scale(1.03);
    box-shadow:0 20px 40px rgba(0,0,0,0.4);
}
#bg{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<header class="text-center py-10">
    <h1 class="text-5xl font-bold tracking-wide">Dar-Store</h1>
    <p class="text-gray-400 mt-3">Modern Home & Kitchen Essentials</p>

    <!-- الزرار يتحط هنا -->
    <a href="products.html" class="bg-blue-600 px-6 py-3 rounded-xl inline-block mt-6">
        Shop Now
    </a>
</header>
<section class="grid md:grid-cols-3 gap-10 px-10 py-20">

    <div class="card p-8 rounded-2xl">
        <h2 class="text-2xl mb-4">Kitchen Tools</h2>
        <p class="text-gray-400">Premium tools for your modern kitchen.</p>
    </div>

    <div class="card p-8 rounded-2xl">
        <h2 class="text-2xl mb-4">Home Essentials</h2>
        <p class="text-gray-400">Everything your home needs in one place.</p>
    </div>

    <div class="card p-8 rounded-2xl">
        <h2 class="text-2xl mb-4">Best Quality</h2>
        <p class="text-gray-400">Carefully selected products for durability.</p>
    </div>

</section>

<footer class="text-center py-10 text-gray-500">
    © 2026 Dar-Store. All rights reserved.
</footer>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('bg'), alpha:true});
renderer.setSize(window.innerWidth, window.innerHeight);

const geometry = new THREE.TorusGeometry(10, 3, 16, 100);
const material = new THREE.MeshStandardMaterial({color:0x3b82f6});
const torus = new THREE.Mesh(geometry, material);
scene.add(torus);

const pointLight = new THREE.PointLight(0xffffff);
pointLight.position.set(20,20,20);
scene.add(pointLight);

camera.position.z = 30;

function animate(){
    requestAnimationFrame(animate);
    torus.rotation.x += 0.003;
    torus.rotation.y += 0.004;
    renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
    renderer.setSize(window.innerWidth,window.innerHeight);
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
});
</script>

</body>
</html>
