<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دار | كل ما يحتاجه البيت</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --brown-dark: #6B4F3A;
      --brown-mid: #B87333;
      --cream: #EFE6DC;
      --charcoal: #2B2B2B;
      --white: #FDFAF7;
      --brown-light: #D4A574;
      --cream-dark: #E5D5C5;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--white);
      color: var(--charcoal);
      overflow-x: hidden;
    }

    /* ===== NAVBAR ===== */
    nav {
      position: fixed; top: 0; width: 100%; z-index: 100;
      background: rgba(253,250,247,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--cream-dark);
      padding: 0 5%;
      display: flex; align-items: center; justify-content: space-between;
      height: 72px;
    }

    .nav-logo {
      font-family: 'Amiri', serif;
      font-size: 2rem;
      color: var(--brown-dark);
      font-weight: 700;
      text-decoration: none;
      display: flex; align-items: center; gap: 8px;
    }

    .nav-logo .house-icon {
      width: 36px; height: 36px;
      background: var(--brown-dark);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: var(--cream);
      font-size: 1.1rem;
    }

    .nav-links {
      display: flex; gap: 2rem; list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--charcoal);
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.3s;
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute; bottom: -4px; right: 0;
      width: 0; height: 2px;
      background: var(--brown-mid);
      transition: width 0.3s;
    }

    .nav-links a:hover { color: var(--brown-dark); }
    .nav-links a:hover::after { width: 100%; }

    .nav-actions {
      display: flex; gap: 1rem; align-items: center;
    }

    .btn-cart {
      background: var(--brown-dark);
      color: var(--cream);
      border: none; padding: 10px 22px;
      border-radius: 30px;
      font-family: 'Tajawal', sans-serif;
      font-size: 0.9rem; font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      display: flex; align-items: center; gap: 8px;
    }

    .btn-cart:hover {
      background: var(--brown-mid);
      transform: translateY(-1px);
    }

    /* ===== HERO ===== */
    .hero {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--cream) 0%, var(--white) 60%, #F5EAE0 100%);
      display: flex; align-items: center;
      padding: 100px 5% 60px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -100px; left: -100px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(184,115,51,0.08) 0%, transparent 70%);
      border-radius: 50%;
    }

    .hero-content {
      flex: 1; z-index: 2;
      animation: fadeInUp 0.9s ease both;
    }

    .hero-tag {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(107,79,58,0.1);
      color: var(--brown-dark);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85rem; font-weight: 600;
      margin-bottom: 1.5rem;
      border: 1px solid rgba(107,79,58,0.15);
    }

    .hero h1 {
      font-family: 'Amiri', serif;
      font-size: clamp(3rem, 6vw, 5.5rem);
      color: var(--brown-dark);
      line-height: 1.15;
      margin-bottom: 0.5rem;
      font-weight: 700;
    }

    .hero h1 span {
      color: var(--brown-mid);
      display: block;
    }

    .hero-sub {
      font-size: 1.15rem;
      color: #8A7060;
      line-height: 1.7;
      margin: 1.5rem 0 2.5rem;
      max-width: 460px;
    }

    .hero-btns {
      display: flex; gap: 1rem; flex-wrap: wrap;
    }

    .hero-stats {
      display: flex; gap: 3rem;
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--cream-dark);
    }

    .stat h3 {
      font-family: 'Amiri', serif;
      font-size: 2rem;
      color: var(--brown-dark);
    }

    .stat p {
      font-size: 0.85rem;
      color: #9A8878;
    }

    .hero-visual {
      flex: 1; display: flex; justify-content: center;
      align-items: center; position: relative; z-index: 2;
    }

    .hero-card-main {
      width: 320px; height: 380px;
      background: var(--white);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(107,79,58,0.15);
      overflow: hidden;
      position: relative;
    }

    .hero-card-img {
      width: 100%; height: 240px;
      background-size: cover;
      background-position: center;
    }

    .hero-card-info {
      padding: 20px;
    }

    .hero-card-info h3 {
      font-family: 'Amiri', serif;
      font-size: 1.2rem;
      color: var(--charcoal);
    }

    .hero-card-info p {
      color: #9A8878;
      font-size: 0.85rem;
      margin: 4px 0 12px;
    }

    .hero-card-price {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--brown-mid);
    }

    .hero-card-float {
      position: absolute;
      top: -20px; left: -30px;
      width: 140px; height: 140px;
      background: var(--cream);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(107,79,58,0.12);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      font-size: 2rem;
      color: var(--brown-dark);
      z-index: 3;
    }

    .hero-card-float span {
      font-size: 0.85rem;
      font-weight: 600;
      font-family: 'Tajawal', sans-serif;
    }

    /* ===== CATEGORIES ===== */
    .categories {
      padding: 80px 5%;
      background: var(--white);
    }

    .section-header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .section-label {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--brown-mid);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .section-title {
      font-family: 'Amiri', serif;
      font-size: clamp(2rem, 3.5vw, 2.8rem);
      color: var(--brown-dark);
      line-height: 1.3;
    }

    .cats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
    }

    .cat-card {
      background: var(--cream);
      border-radius: 20px;
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
      border: 2px solid transparent;
      position: relative;
      overflow: hidden;
    }

    .cat-card:hover {
      transform: translateY(-8px);
      border-color: var(--brown-mid);
      box-shadow: 0 16px 40px rgba(107,79,58,0.15);
    }

    .cat-icon {
      width: 64px; height: 64px;
      background: var(--white);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
      margin: 0 auto 1.2rem;
      box-shadow: 0 4px 12px rgba(107,79,58,0.1);
      transition: all 0.3s;
      color: var(--brown-dark);
    }

    .cat-card:hover .cat-icon {
      background: var(--brown-dark);
      transform: scale(1.1);
      color: var(--cream);
    }

    .cat-card h3 {
      font-weight: 700;
      color: var(--brown-dark);
      margin-bottom: 6px;
    }

    .cat-card p {
      font-size: 0.83rem;
      color: #9A8878;
    }

    /* ===== FEATURED PRODUCTS ===== */
    .products {
      padding: 80px 5%;
      background: linear-gradient(180deg, var(--white) 0%, var(--cream) 100%);
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
      margin-top: 3rem;
    }

    .product-card {
      background: var(--white);
      border-radius: 20px;
      overflow: hidden;
      transition: all 0.35s ease;
      box-shadow: 0 2px 12px rgba(107,79,58,0.06);
      position: relative;
    }

    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 40px rgba(107,79,58,0.15);
    }

    .product-img {
      width: 100%; height: 220px;
      background-size: cover;
      background-position: center;
      position: relative;
    }

    .product-badge {
      position: absolute; top: 12px; right: 12px;
      background: var(--brown-mid);
      color: white;
      font-size: 0.75rem; font-weight: 700;
      padding: 4px 10px;
      border-radius: 12px;
    }

    .product-badge.new { background: var(--brown-dark); }
    .product-badge.sale { background: #C0392B; }

    .product-info { padding: 16px; }
    .product-category {
      font-size: 0.75rem; color: var(--brown-mid); font-weight: 600; margin-bottom: 4px;
    }
    .product-info h3 { font-weight: 700; color: var(--charcoal); margin-bottom: 4px; font-size: 1rem; }
    .product-info .desc { font-size: 0.82rem; color: #9A8878; margin-bottom: 12px; line-height: 1.5; height: 36px; overflow: hidden; }
    .product-footer { display: flex; justify-content: space-between; align-items: center; }
    .product-price { font-size: 1.2rem; font-weight: 800; color: var(--brown-dark); }
    .product-price .currency { font-size: 0.85rem; font-weight: 500; }

    .btn-add {
      width: 38px; height: 38px;
      background: var(--brown-dark);
      color: white; border: none; border-radius: 50%;
      font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s;
    }
    .btn-add:hover { background: var(--brown-mid); transform: scale(1.1); }

    /* ===== PROMO BANNER ===== */
    .banner {
      margin: 0 5% 80px;
      border-radius: 28px;
      background: linear-gradient(135deg, var(--brown-dark) 0%, #4A3321 100%);
      padding: 60px 8%;
      display: flex; align-items: center; justify-content: space-between;
      overflow: hidden;
      position: relative;
    }

    .banner-content { z-index: 2; }
    .banner h2 { font-family: 'Amiri', serif; font-size: clamp(1.8rem, 3vw, 2.8rem); color: var(--cream); margin-bottom: 0.5rem; }
    .banner p { color: rgba(239,230,220,0.75); margin-bottom: 1.5rem; font-size: 1.05rem; }
    .banner-discount { display: inline-block; background: var(--brown-mid); color: white; font-size: 1.5rem; font-weight: 800; padding: 8px 20px; border-radius: 14px; margin-bottom: 1.5rem; }
    
    .banner-visual-icons {
      font-size: 4rem; color: rgba(239,230,220,0.15); display: flex; gap: 2rem; z-index: 1;
    }

    /* ===== FEATURES ===== */
    .features { padding: 80px 5%; background: var(--white); }
    .features-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2rem; margin-top: 3rem; }
    .feature-item { text-align: center; padding: 2rem 1rem; }
    .feature-icon { width: 64px; height: 64px; background: var(--cream); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0 auto 1rem; color: var(--brown-dark); }
    .feature-item h3 { font-weight: 700; color: var(--brown-dark); margin-bottom: 6px; }
    .feature-item p { font-size: 0.875rem; color: #9A8878; line-height: 1.6; }

    /* ===== TESTIMONIALS ===== */
    .testimonials { padding: 80px 5%; background: var(--cream); }
    .test-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-top: 3rem; }
    .test-card { background: var(--white); border-radius: 20px; padding: 2rem; box-shadow: 0 2px 12px rgba(107,79,58,0.06); }
    .test-stars { color: var(--brown-mid); margin-bottom: 1rem; font-size: 0.9rem; }
    .test-text { font-size: 0.95rem; color: var(--charcoal); line-height: 1.7; margin-bottom: 1.5rem; font-style: italic; }
    .test-author { display: flex; align-items: center; gap: 12px; }
    .test-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--brown-mid), var(--brown-dark)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 1.1rem; }
    .test-name { font-weight: 700; color: var(--brown-dark); font-size: 0.9rem; }
    .test-role { font-size: 0.78rem; color: #9A8878; }

    /* ===== NEWSLETTER ===== */
    .newsletter { padding: 80px 5%; background: var(--white); text-align: center; }
    .newsletter-box { max-width: 560px; margin: 0 auto; }
    .newsletter h2 { font-family: 'Amiri', serif; font-size: 2.2rem; color: var(--brown-dark); margin-bottom: 0.75rem; }
    .newsletter p { color: #9A8878; margin-bottom: 2rem; line-height: 1.6; }
    .newsletter-form { display: flex; overflow: hidden; border-radius: 50px; border: 2px solid var(--brown-dark); background: var(--white); }
    .newsletter-form input { flex: 1; border: none; outline: none; padding: 14px 20px; font-family: 'Tajawal', sans-serif; font-size: 0.95rem; background: transparent; color: var(--charcoal); }
    .newsletter-form button { background: var(--brown-dark); color: var(--cream); border: none; padding: 0 28px; font-family: 'Tajawal', sans-serif; font-size: 0.95rem; font-weight: 600; cursor: pointer
